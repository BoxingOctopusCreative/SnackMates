services:

  api:
    image: ghcr.io/snackmates/snackmates-api:latest
    ports:
      - "8080:8080"
    environment:
      HOSTNAME: api
      DOMAIN: snackmates.food
      API_PORT: 8080
      API_BASE_URL: https://api.snackmates.food
      WEB_ORIGIN: https://snackmates.food
      JWT_SECRET: $JWT_SECRET
      DATABASE_URL: $DATABASE_URL
      VALKEY_URL: $VALKEY_URL
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: $MEILISEARCH_API_KEY
      S3_ENDPOINT: $S3_ENDPOINT
      S3_REGION: auto
      S3_ACCESS_KEY: $S3_ACCESS_KEY
      S3_SECRET_KEY: $S3_SECRET_KEY
      S3_CLIENT_ASSETS_BUCKET: $S3_CLIENT_ASSETS_BUCKET
      S3_STATIC_ASSETS_BUCKET: $S3_STATIC_ASSETS_BUCKET

    depends_on:
      - meilisearch
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: ghcr.io/snackmates/snackmates-web:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: snackmates-dev-master-key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  meilisearch_data:
