services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: snackmates
      POSTGRES_PASSWORD: snackmates
      POSTGRES_DB: snackmates
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snackmates -d snackmates"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: snackmates-dev-master-key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: snackmates
      MINIO_ROOT_PASSWORD: snackmates-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./web/content/legal:/legal:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 snackmates snackmates-dev &&
      mc mb --ignore-existing local/client-assets &&
      mc mb --ignore-existing local/static-assets &&
      mc anonymous set download local/static-assets &&
      mc cp --recursive /legal/ local/static-assets/legal/ &&
      exit 0
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  valkey_data:
  meilisearch_data:
  minio_data:
